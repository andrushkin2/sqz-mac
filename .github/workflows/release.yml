# GitHub Actions release workflow.
# Requirement 16.2: GitHub Releases CI workflow.
#
# Triggers on version tags (v*.*.*).
# Builds statically-linked binaries for all 5 supported platforms and
# uploads them as GitHub Release assets.
#
# For each target we ship TWO archives:
#   * sqz-<version>-<target>.{tar.gz,zip}     — the CLI
#   * sqz-mcp-<version>-<target>.{tar.gz,zip} — the MCP server
#
# Both tarballs are flat (single binary at the root, no wrapping
# directory) so that `tar -xzf archive.tar.gz` extracts the binary
# directly into the current working directory. Consumers depend on
# this layout: install.sh, install.ps1, and npm/install.js all assume
# a top-level binary — no `archive/sqz` nesting.
#
# If you add another crate, also add it to the `binaries` list below
# AND to install.sh / install.ps1 / npm/install.js — the distribution
# surfaces are parallel and do not auto-sync. The Homebrew formula lives
# in the dedicated tap repo (ojuschugh1/homebrew-sqz) and is regenerated
# via repository_dispatch from the dispatch-homebrew-tap job below.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — fully static via musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # Linux aarch64 — fully static via musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # macOS x86_64 (cross-compiled on Apple Silicon runner)
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # Windows x86_64 — static CRT
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cross is used for Linux musl targets to avoid needing a local musl
      # toolchain on the GitHub-hosted runner.
      - name: Install cross (Linux musl targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin sqz --bin sqz-mcp

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --bin sqz --bin sqz-mcp

      # ── Package ────────────────────────────────────────────────────────────
      #
      # One flat tarball per binary, no wrapper directory. install.sh,
      # install.ps1 and npm/install.js all depend on this layout — if
      # you change it, update those three too.

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eu
          TARGET="${{ matrix.target }}"
          VERSION="${GITHUB_REF_NAME}"
          STAGING="$(mktemp -d)"
          ASSETS=""
          for BINARY in sqz sqz-mcp; do
            ARCHIVE="${BINARY}-${VERSION}-${TARGET}.tar.gz"
            if [ -f "target/${TARGET}/release/${BINARY}" ]; then
              cp "target/${TARGET}/release/${BINARY}" "${STAGING}/${BINARY}"
              tar -czf "${ARCHIVE}" -C "${STAGING}" "${BINARY}"
              rm "${STAGING}/${BINARY}"
              ASSETS="${ASSETS}${ASSETS:+$'\n'}${ARCHIVE}"
            else
              echo "::warning::Binary ${BINARY} not found for ${TARGET}, skipping"
            fi
          done
          rm -rf "${STAGING}"
          {
            echo "ASSET_LIST<<EOF"
            echo "${ASSETS}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TARGET = "${{ matrix.target }}"
          $VERSION = "$env:GITHUB_REF_NAME"
          $Assets = @()
          foreach ($BINARY in @("sqz", "sqz-mcp")) {
            $ARCHIVE = "${BINARY}-${VERSION}-${TARGET}.zip"
            $SrcExe = "target\${TARGET}\release\${BINARY}.exe"
            $TmpExe = "${BINARY}.exe"
            if (Test-Path $SrcExe) {
              Copy-Item $SrcExe $TmpExe
              Compress-Archive -Path $TmpExe -DestinationPath $ARCHIVE -Force
              Remove-Item $TmpExe
              $Assets += $ARCHIVE
            } else {
              Write-Warning "Binary ${BINARY}.exe not found for ${TARGET}, skipping"
            }
          }
          # Newline-separated for ASSET_LIST multiline var.
          $AssetList = ($Assets -join "`n")
          "ASSET_LIST<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append
          $AssetList | Out-File -FilePath $env:GITHUB_ENV -Append
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            sqz-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            sqz-${{ github.ref_name }}-${{ matrix.target }}.zip
            sqz-mcp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            sqz-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Publish to npm ───────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync npm package version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          # Update package.json version to match the git tag
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing sqz-cli@${VERSION} to npm"

      - name: Publish
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Ping homebrew-sqz tap to trigger formula update ──────────────────────
  #
  # After the GitHub Release is published, send a repository_dispatch event
  # to ojuschugh1/homebrew-sqz. The tap's update-sqz.yml workflow listens
  # for this event and immediately runs the formula updater — no waiting for
  # the nightly cron.
  #
  # Requires a PAT with `repo` scope stored as HOMEBREW_TAP_TOKEN in this
  # repo's secrets. The default GITHUB_TOKEN cannot dispatch to a different
  # repo. If the secret is unset we skip gracefully so the release itself
  # still succeeds — users can manually trigger the tap workflow until the
  # secret is configured.
  dispatch-homebrew-tap:
    name: Ping homebrew-sqz tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch update to homebrew-sqz
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not set."
            echo "::warning::Skipping homebrew tap dispatch. The tap's nightly cron"
            echo "::warning::will pick up this release within 24 hours, OR you can"
            echo "::warning::manually trigger the workflow at:"
            echo "::warning::  https://github.com/ojuschugh1/homebrew-sqz/actions/workflows/update-sqz.yml"
            exit 0
          fi

          # Use --fail-with-body so we get the actual API error message on
          # failure (curl -fsSL would print "exit 22" with no detail).
          response_file="$(mktemp)"
          if curl --silent --show-error --location \
                --fail-with-body \
                --output "${response_file}" \
                --write-out "%{http_code}" \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/ojuschugh1/homebrew-sqz/dispatches" \
                -d "{\"event_type\":\"sqz-release\",\"client_payload\":{\"version\":\"${REF_NAME}\"}}" \
                | tee "${response_file}.code"; then
            echo ""
            echo "✓ Dispatched sqz-release event to homebrew-sqz for ${REF_NAME}"
          else
            echo "::error::Homebrew tap dispatch failed."
            echo "::error::Response body:"
            cat "${response_file}" >&2 || true
            echo ""
            echo "::error::Common causes:"
            echo "::error::  - HOMEBREW_TAP_TOKEN expired or lacks 'repo' scope"
            echo "::error::  - Tap repo renamed or deleted"
            echo "::error::  - Tap workflow missing repository_dispatch trigger"
            exit 1
          fi
